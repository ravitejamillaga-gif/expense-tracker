<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            overflow: hidden;
        }

        /* FLOATING MONEY SYMBOLS */
        .money {
            position: absolute;
            font-size: 30px;
            opacity: 0.2;
            animation: float 8s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        /* LOGIN BOX */
        .box {
            width: 350px;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: white;
            z-index: 10;
        }

        /* BIG HEADING */
        h1 {
            text-align: center;
            font-size: 34px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #facc15;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #16a34a;
        }

        a {
            color: #facc15;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 10px;
        }

    </style>
</head>

<body>

<!-- FLOATING CASH SYMBOLS -->
<div class="money" style="left:10%">💰</div>
<div class="money" style="left:30%">💵</div>
<div class="money" style="left:50%">💸</div>
<div class="money" style="left:70%">💰</div>
<div class="money" style="left:90%">💵</div>

<div class="box">

    <!-- BIG ATTRACTIVE TITLE -->
<h1 class="main-title">
    <span class="coin">💰</span>
    Expense Tracker
    <span class="coin">🪙</span>
</h1>

    <form method="POST" action="/login">

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <a href="/register">Create Account</a>

</div>

</body>
</html>
